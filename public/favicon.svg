    <!-- Clinic building body -->
    <rect x="14" y="28" width="36" height="24" rx="2" fill="white" />

    <!-- Roof / rooftop triangle -->
    <path d="M10 30 L32 12 L54 30Z" fill="white" />

    <!-- Medical cross on building — horizontal bar -->
    <rect x="26" y="34" width="12" height="4" rx="1" fill="#2563EB" />

    <!-- Medical cross on building — vertical bar -->
    <rect x="30" y="30" width="4" height="12" rx="1" fill="#2563EB" />

    <!-- Door at bottom center -->
    <rect x="28" y="42" width="8" height="10" rx="1" fill="#2563EB" />

</svg>